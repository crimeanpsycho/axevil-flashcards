  {cat:'1',q:'Что такое Axevil Capital и в чём его основная ценность для инвестора?',a:'Технологическая платформа, предоставляющая профессиональным инвесторам прямой доступ к лучшим Pre-IPO компаниям. До 80% стоимости компании формируется на частной стадии. IRR в Series E-H достигает 60-83%, после IPO — 0-5%. Минимальный порог входа: $10 000.'},
  {cat:'1',q:'Каковы ключевые метрики Axevil Capital?',a:'AUM $130M+, 1000+ клиентов-инвесторов, 150+ партнёров, 30+ компаний в портфеле, 3500 пользователей приложения, 50+ стран. Цель к 2028: AUM $1B+, 5000–10 000+ клиентов, 1000+ партнёров.'},
  {cat:'1',q:'Кто основал Axevil Capital и каков опыт управляющей команды?',a:'Александр Иванов — 12+ лет в инвест.-банковской сфере (Финам, Открытие, Атон, wealth management). Тарас Чумаченко — 10+ лет в альт. инвестициях, руководящие должности в Societe Generale. Советники: Алексей Гарюнов (Finsight Ventures), Роман Бузько (Buzko Krasnov), Илья Горин (FP Wealth Solutions).'},
  {cat:'1',q:'Какова юридическая структура сделок Axevil Capital?',a:'Управляющая компания Axevil Capital LLC (Delaware). Фонд Alextar VC LLC — Series SPV LLC. Каждая SPV изолирована, владеет акциями одной компании. Регулятор: SEC, статус ERA, рег. номер #802-126907, FINRA CRD 323970. Для СНГ — Axevil Capital KZ Ltd (МФЦА, Казахстан).'},
  {cat:'1',q:'Почему Делавэр выбран как юрисдикция?',a:'99% стартапов и VC-фондов США зарегистрированы там. Delaware LLC Act раздел 18-215 позволяет Series LLC с полной изоляцией активов. Развитая прецедентная база, стандартная терминология. С 2017 года признана легитимность крипто-транзакций.'},
  {cat:'1',q:'Кто оказывает операционную поддержку сделок?',a:'Юр. сопровождение: Buzko & Krasnov, O2 Consulting. Налоги/бухгалтерия: Swampscott Tax & Bookkeeping (США). Банки: Brex, J.P. Morgan, Mercury. Крипто: Binance.US, Coinbase. Рег. агенты: IncParadise (Axevil Capital LLC), A Best Registered Agent LLC (Alextar VC LLC).'},
  {cat:'1',q:'Чем Axevil отличается от брокеров с квази-инструментами?',a:'У брокеров инвестор получает структурную ноту без реального права на акции. В Axevil инвестор подписывает SPV Agreement, становится бенефициаром SPV, которая напрямую владеет акциями. Каждая сделка регистрируется в SEC через Form D. Инвестор получает Capital Account Statement — сертификат долевого участия.'},
  {cat:'2',q:'Как Axevil отбирает компании для портфеля?',a:'1300+ компаний в мониторинге → 120+ в списке наблюдения → 30+ в портфеле. Критерии: высокий потенциал роста, масштабируемая модель, late-stage (Series C+), интерес Tier-1 фондов (Sequoia, SoftBank, Lightspeed), ожидаемый выход через IPO/M&A за 1-3 года.'},
  {cat:'2',q:'Какой due diligence проводится перед инвестицией?',a:'Legal & financial DD: корпоративная структура, права акционеров, ограничения на продажу (ROFR, transfer restrictions), корпоративные одобрения, санкционные риски продавца. Для развивающихся рынков — дополнительный DD по аудиторским заключениям. Axevil использует DD Tier-1 фондов как сигнал качества.'},
  {cat:'2',q:'Какие механизмы приобретения акций использует Axevil?',a:'1) Прямое приобретение на вторичном рынке у ранних акционеров или в новом раунде. 2) Форвардный контракт — фиксация условий покупки с передачей акций в будущем. 3) Покупка доли в вышестоящей SPV. Выбор зависит от ROFR, корпоративной политики и уровня доступа к сделке.'},
  {cat:'2',q:'Каковы параметры участия в сделке?',a:'Минимальная сумма: $10 000. Комиссия на входе: до 5% сверх суммы. Carry: до 20% от дохода сверх первоначальных инвестиций (только после выхода). Крипто: +1.5% за конвертацию USDT/USDC. Срок раунда: 4-8 недель. Срок инвестиции: 2-5 лет.'},
  {cat:'2',q:'Как проходит процедура присоединения инвестора?',a:'8 шагов: 1) Анкета (аккредитованный инвестор), 2) KYC (OFAC/SDN, PEP), 3) W8-BEN(E)/W9, 4) SPV Agreement (PPM + Operating Agreement + Subscription Agreement), 5) Capital Call, 6) Подтверждение средств, 7) Capital Account Statement (30 дней после Form D), 8) Schedule K-1 (до 31 октября след. года).'},
  {cat:'2',q:'Как инвестор может подтвердить легитимность инвестиции?',a:'1) Регистрация Axevil Capital LLC и Alextar VC LLC — на сайте штата Делавэр. 2) Лицензия ERA и отчётность — sec.gov/edgar. 3) Form D по каждой сделке в реестре SEC. 4) Capital Account Statement — персональный документ, выпускается через 30 дней после регистрации Form D.'},
  {cat:'3',q:'Как происходит выход через IPO?',a:'SPV удерживает акции до IPO. После листинга — lock-up 5-6 месяцев. Затем SPV продаёт акции и распределяет средства пропорционально долям. Способы выплаты: USD на зарубежный банковский счёт (не в РФ), USDT/USDC на крипто-кошелёк, перевод акций на брокерский счёт.'},
  {cat:'3',q:'Каковы альтернативные сценарии выхода помимо IPO?',a:'1) M&A — поглощение с премией (кейс Scale AI + Meta). 2) Вторичный рынок до IPO (кейс Anthropic, планируется secondary marketplace в приложении). 3) Обратный выкуп компанией. 4) Долгосрочное владение — перевод акций на брокерский счёт после IPO.'},
  {cat:'3',q:'Каков срок инвестиции и что влияет на его продолжительность?',a:'Как правило, 2-5 лет. Срок определяется событием ликвидности (IPO, M&A, вторичный рынок). Медиана до IPO в tech сейчас ~12 лет, но Axevil инвестирует на late-stage, горизонт 1-3 года. Skild AI и Project Prometheus ориентированы на IPO 2029.'},
  {cat:'3',q:'Какие исторические результаты показал Axevil на реализованных сделках?',a:'Confluent (март–ноябрь 2021): 256% IRR, вход на вторичном рынке, IPO NASDAQ, выход после lock-up. Anthropic (апр. 2024–янв. 2026): 240%+ IRR, частичный выход на вторичном рынке. Circle (апр. 2024–ноя. 2025): 200% IRR, IPO NASDAQ июнь 2025, акция $83.23 (+168% к цене IPO). Scale AI (янв. 2024–июнь 2025): спецдивиденд $16.83/акцию + рост +70%.'},
  {cat:'3',q:'Почему Pre-IPO инвестиции превосходят публичный рынок?',a:'1) 80% стоимости создаётся на частной стадии. 2) Late stage PE превосходит Nasdaq в 2.3x (39% vs 17% за 2012-2024). 3) Оценки двигаются по раундам и выручке — низкая волатильность. 4) Единственный доступ к топ-компаниям AI, Blockchain, DeepTech. 5) 86% Family Offices инвестируют в Private Markets.'},
  {cat:'4',q:'Расскажите о Skild AI — ключевые факты для инвестора.',a:'Основан 2023, Питтсбург, PA. Продукт: Skild Brain — VLA-модель для робота любого форм-фактора без переобучения. Выручка $30M в 2025. Series C $1.4B при оценке $14B (янв. 2026), всего $2.2B за 18 месяцев. Инвесторы: SoftBank, Nvidia, Bezos, LG, Samsung, Sequoia. Параметры Axevil: вход $17.95B, цель $80B, IPO 2029, апсайд 4.5x.'},
  {cat:'4',q:'В чём конкурентное преимущество Skild AI перед Figure AI и Physical Intelligence?',a:'Единственная компания с выручкой ($30M; Figure и 1X — без выручки). Не производит роботов — лицензирует ПО: маржа 70-85% vs 25-35%. Стоимость развёртывания $4-15K vs $250K+. Доступ к 700K манипуляторов ABB и Universal Robots. Обучение на 1000x больше симулированных данных (Nvidia Isaac Lab). Контракт Foxconn (март 2026) + поглощение Zebra (апрель 2026).'},
  {cat:'4',q:'Расскажите о Project Prometheus — что это и почему интересно?',a:'Основан 2025, Сан-Франциско. Co-CEO: Джефф Безос + Вик Баджадж (PhD MIT, экс-Google X, Waymo). AI-система для инженерии физического мира: мировые модели, цифровые двойники, AI-инженер (замена CAD). Рынок $14 трлн vs $300B у LLM. $16.2B привлечено за 5 месяцев. Инвесторы: BlackRock, J.P. Morgan, суверенные фонды. Параметры Axevil: вход $48B, цель ~$500B, IPO 2029, апсайд ~10.4x.'},
  {cat:'4',q:'Почему Prometheus имеет высокий апсайд при уже высокой оценке входа?',a:'1) Рынок $14 трлн (промышленное проектирование) vs $300B (LLM) — разница 47x. 2) Безос повторяет плейбук AWS: первопроходец, закрытый режим, неограниченный капитал. 3) Прямые каналы: Blue Origin, Amazon (1 млн роботов). 4) Действующие лидеры (ANSYS, Dassault, Synopsys) не могут переписать ПО без каннибализации выручки. 5) B2B корпоративные контракты — высокий retention.'},
  {cat:'4',q:'Какие ещё компании есть в портфеле Axevil?',a:'Fintech: Klarna, Stripe, Revolut, Tamara, Toss, Razorpay, Bolt. AI: Anthropic, Glean, Cursor, Databricks, Scale AI, AI Fund. Blockchain: Kraken, Consensys, Blockdaemon. B2B SaaS: Canva, Automation Anywhere, Gupshup. Consumer Tech: Uzum, Rappi, BYJU\'S, Betr. CyberSec: Netskope, Tanium. DeepTech: SpaceX, Neuralink.'},
  {cat:'5',q:'Что такое SPV и как она защищает интересы инвестора?',a:'SPV (Special Purpose Vehicle) — Series LLC под конкретную инвестиционную цель. Преимущества: 1) Изоляция активов — риски одной SPV не затрагивают остальные. 2) 100% уставного капитала = акции одной компании. 3) Axevil Capital LLC не может претендовать на активы SPV. 4) SPV не может обанкротиться. 5) Инвестор — бенефициар SPV пропорционально вкладу.'},
  {cat:'5',q:'Какие документы подписывает инвестор?',a:'SPV Agreement из трёх частей: 1) PPM (Private Placement Memorandum) — стратегия, структура, оценка, риски. 2) Operating Agreement — управление SPV, права инвесторов, порядок распределения прибыли и ликвидации. 3) Subscription Agreement — условия подписки, сумма, подтверждение аккредитации. Дополнительно: W8-BEN(E) для нерезидентов США.'},
  {cat:'5',q:'Что такое Form D и зачем она нужна?',a:'Обязательная отчётность в SEC по Regulation D, Rule 506(b) — частное размещение без публичной регистрации. Содержит: наименование SPV, объём инвестиций, количество инвесторов. Проверить на sec.gov/edgar. Подтверждает законность сделки и прозрачность перед регулятором США.'},
  {cat:'5',q:'Какие налоговые обязательства возникают у инвестора?',a:'Series SPV LLC — налогово-прозрачная структура (pass-through). Сама SPV не платит корпоративный налог. Обязательства возникают у инвесторов только при получении прибыли после выхода. Нерезиденты США заполняют W-8BEN (физлица) или W-8BEN-E (юрлица). Ежегодно инвесторы получают Schedule K-1 (Form 1065) — в течение 10 месяцев после налогового периода.'},
  {cat:'6',q:'Что такое Axevil App и какие функции он предоставляет?',a:'Мобильное приложение, 3500 пользователей в 50+ странах. Функции: Deal Discovery (витрина сделок), Smart Onboarding (KYC за 3 мин.), One-Click Investing, Portfolio Tracking (real-time, квартальные обновления), AI-ассистент «Клаудия» (анализ компаний, рисков, персональные рекомендации). Полностью цифровой процесс: от KYC до выпуска сертификатов и цифровой подписи.'},
  {cat:'6',q:'Что такое Axevil Pro и для кого он предназначен?',a:'Платформа для управляющих капиталом и партнёров. Включает: Deal Flow Management (пайплайн, DD-материалы, апдейты), AI-powered CRM (умные лиды, автоматизация продаж), Marketing Hub (материалы, гайды, видео-питчи). В разработке: Trading Desk, Market Explorer, Whitelabel API, secondary marketplace. Цель к 2028 — AI-driven private equity платформа.'},
  {cat:'6',q:'Как Axevil Capital планирует развиваться до 2028 года?',a:'2025-2026: web-партнёрский портал, Market Deal Flow, расширение лицензий, партнёрство с брокерами СНГ. 2026-2027: Whitelabel и API для институциональных клиентов, legal в MENA, secondary marketplace. 2027-2028: масштабирование через партнёрские каналы. Цель 2028: AUM $1B+, 10 000+ клиентов, 1000+ партнёров.'},
  {cat:'7',q:'Что представляет собой партнёрство с Finsight Ventures?',a:'20 лет на рынке, AUM $550M, $400M в 90 компаний, 31 выход, среднее MOIC 4.1x (IRR ~35.6%). Совместные инвестиции: Databricks, Anthropic, Stripe, Scale AI, Klarna, Kraken, SpaceX, Circle и 20+ компаний. Синергия: экспертиза Finsight + технологическая скорость и доступность Axevil.'},
  {cat:'7',q:'Какова роль партнёрской сети в бизнес-модели Axevil?',a:'Партнёры — ключевой канал привлечения инвесторов. Axevil Pro: AI-CRM, пайплайн сделок с DD, marketing kit, образовательные материалы, портфельная аналитика. Партнёры получают вознаграждение за привлечённые сделки. 150+ партнёров сейчас (цель к 2028 — 1000+): wealth managers, брокеры, family offices, советники из 50+ стран.'},
  {cat:'8',q:'Какова позиция Axevil на рынке Private Markets?',a:'Единая Private Markets экосистема, решающая 4 боли: фрагментированность (нет единой точки доступа), непрозрачность (нет real-time трекинга), ручные процессы (сложное юр. оформление), разрозненная инфраструктура (только квази-инструменты). Конкурентные преимущества: 100% цифровой процесс, минимальный чек $10K, регуляция SEC, трек-рекорд.'},
  {cat:'8',q:'Почему именно сейчас хорошее время для Pre-IPO через Axevil?',a:'1) 86% Family Offices инвестируют в Private Markets, 41% увеличивают аллокацию. 2) Лучшие компании дольше остаются частными (медиана 12 лет до IPO). 3) Катализаторы в портфельных компаниях. 4) IPO-окно открывается: Klarna, Circle, Databricks. 5) Axevil снижает барьер с $250K+ до $10K.'},
  {cat:'9',q:'Каковы основные риски инвестирования через Axevil Capital?',a:'1) Риск ликвидности — нет гарантии выхода в нужный момент. 2) Риск IPO — компания может перенести/отменить листинг. 3) Рыночный риск — во время lock-up цена может упасть. 4) Концентрационный риск — каждая SPV держит акции одной компании. 5) Регуляторный риск. 6) Валютный риск (USD). 7) Срок 2-5 лет — капитал неликвиден.'},
  {cat:'9',q:'Что происходит, если портфельная компания не выйдет на IPO?',a:'Возможные сценарии: 1) M&A — поглощение с премией (кейс Scale AI + Meta). 2) Вторичный рынок — досрочная продажа. 3) Обратный выкуп компанией. 4) Долгосрочное удержание. Axevil помогает найти покупателя через партнёрское сообщество. Доля инвестора не теряется — SPV остаётся акционером компании.'},
  {cat:'10',q:'Кто может инвестировать через Axevil Capital?',a:'Физические и юридические лица при условии: KYC (OFAC/SDN, PEP), соответствие требованиям аккредитованного инвестора SEC, AML/CTF. Работает в 50+ странах. Ограничения: платежи с российских счетов не принимаются, выплаты — только на зарубежные счета (не в РФ). Для СНГ — Axevil Capital KZ Ltd (МФЦА, Казахстан).'},
  {cat:'10',q:'Как можно оплатить инвестицию?',a:'1) SWIFT-перевод с зарубежного счёта через Mercury, Brex, J.P. Morgan — подтверждение на email по факту зачисления. 2) Криптовалюта (USDT/USDC) через Binance.US или Coinbase — подтверждение мгновенно в личном кабинете. Дополнительная комиссия за крипто: 1.5%. Делавэр признал легитимность крипто-транзакций с 2017 года.'},
  {cat:'10',q:'Сколько времени занимает закрытие сделки?',a:'Раунд привлечения: 4-8 недель. Корпоративное одобрение (ROFR): до 45 дней. Регистрация Form D: после подписания документов и сбора средств. Capital Account Statement: 30 дней после Form D. Schedule K-1: 10 месяцев после налогового периода (не позднее 31 октября следующего года).'},
  {cat:'10',q:'Где хранятся акции и как отслеживается их стоимость?',a:'Акции хранятся на балансе SPV — она является акционером портфельной компании. До IPO оценка = post-money valuation последнего раунда. В Axevil App: оценочная стоимость доли (квартальные обновления), Capital Account Statement, статус сделок, новости в real-time. После IPO SPV продаёт акции либо инвестор переводит их на брокерский счёт.'},
  {cat:'11',q:'Как Axevil справляется с риском ROFR?',a:'ROFR (Right of First Refusal) — право компании или акционеров преимущественно выкупить акции. Axevil проверяет наличие ROFR на стадии DD и соблюдает все процедуры. Срок одобрения — до 45 дней. Альтернативные механизмы (форвардный контракт, вышестоящая SPV) позволяют структурировать инвестицию даже при ограничениях на прямую продажу.'},
  {cat:'11',q:'Что произойдёт с инвестицией, если Axevil Capital прекратит работу?',a:'SPV существует независимо от Axevil Capital LLC. Активы SPV изолированы — принадлежат инвесторам как бенефициарам. Operating Agreement определяет порядок ликвидации. Регистрационные агенты поддерживают юридический статус. Swampscott Tax & Bookkeeping ведёт учёт автономно. Инвесторы сохраняют право на долю в SPV.'},
  {cat:'11',q:'Насколько прозрачна оценка актива до IPO?',a:'Базируется на последнем раунде привлечения (post-money valuation) — публичном событии с известными Tier-1 участниками. Axevil указывает конкретную «оценку входа» ($17.95B для Skild AI, $48B для Prometheus) — цену приобретения, не прогноз. Прогнозируемые оценки выхода — аналитические сценарии, не гарантии.'},
  {cat:'11',q:'Есть ли вторичный рынок для выхода до IPO?',a:'Сейчас: Axevil помогает найти покупателя через сообщество 150+ партнёров и 1000+ клиентов. В ближайшее время: запуск secondary marketplace в Axevil App (Coming Soon). Прецедент: кейс Anthropic — частичный выход на вторичном рынке в январе 2026 до IPO.'},
  {cat:'11',q:'Почему Axevil лучше, чем самостоятельное инвестирование через брокера?',a:'Самостоятельный путь требует: закрытый нетворк, юр. оформление (ROFR, transfer restrictions), минимальный чек $250K–$1M, Delaware экспертиза, налоговое сопровождение, мониторинг. Axevil: под ключ, порог $10K, 100% автоматизация, регуляция SEC, аналитика по 30+ компаниям. Трек-рекорд: 256% (Confluent), 240% (Anthropic), 200% (Circle).'},
  {cat:'12',q:'Как рассчитывается реальная доходность с учётом комиссий?',a:'Пример: инвестиция $100K при доходности 4.5x. Платёж на входе: $100K × 1.05 = $105K. Итог при 4.5x: $450K. Доход сверх $100K: $350K. Carry 20%: $70K. Чистый доход: $280K. Итого: $380K. Чистая доходность: 3.8x при валовой 4.5x. Плюс налог в стране резидентства.'},
  {cat:'12',q:'Как комиссионная структура Axevil соотносится с рыночными стандартами?',a:'Стандарт индустрии: management fee 2% годовых + carry 20% (модель 2+20). У Axevil: комиссия на входе до 5% (разовая) + carry до 20% только при наличии прибыли. Нет management fee — выгоднее для долгосрочного инвестора: 2% годовых за 5 лет = 10% капитала до любого роста.'},
  {cat:'12',q:'Что происходит со спецдивидендами во время владения?',a:'Портфельные компании, как правило, не платят дивиденды на стадии роста. Но возможны спецвыплаты: кейс Scale AI — при сделке с Meta инвесторы получили $16.83 на акцию, сохранив акции. Дивиденд поступает в SPV и распределяется пропорционально долям. Все выплаты отражаются в K-1 и в личном кабинете.'},
  {cat:'12',q:'Как оценить реалистичность прогнозов выхода?',a:'Методология: 1) Мультипликаторы EV/Revenue по аналогам (для SaaS 25-30x). 2) Прецеденты в категории (Anthropic, OpenAI, ServiceNow, Snowflake). 3) Сценарный анализ (базовый, не оптимистичный). 4) Конкретные катализаторы. Инвестору стоит самостоятельно оценить проекцию выручки, диапазон мультипликаторов, риск переноса IPO.'},
  {cat:'12',q:'Как начать инвестировать через Axevil Capital?',a:'1) Скачать приложение Axevil (iOS/Android) или зайти на сайт. 2) Smart Onboarding: анкета, KYC за 3 мин., W8-BEN. 3) Изучить активные сделки. 4) Выбрать сделку, проверить DD-материалы. 5) Подать заявку, подписать SPV Agreement. 6) Перевести средства (SWIFT или крипто). 7) Получить Capital Account Statement через 30 дней. support@axevil.com. Минимум: $10 000.'},
  {cat:'13',q:'Что такое Cashea и какую проблему она решает?',a:'Cashea — финтех-монополист в потребительских финансах Венесуэлы. Решает проблему отсутствия кредитования и рассрочек при гиперинфляционной истории и разрушенной банковской системе. Построила первую скоринговую модель на основе поведенческих данных и создала BNPL-инфраструктуру без необходимости кредитной истории. Фактически — Nubank для Венесуэлы с нулевой конкуренцией.'},
  {cat:'13',q:'В чём монопольное конкурентное преимущество Cashea?',a:'Три взаимосвязанных барьера: 1) Data moat — единственная в Венесуэле база поведенческих данных потребителей, воспроизвести невозможно. 2) Network effect — каждая транзакция улучшает скоринговую модель. 3) Regulatory moat — специфическая регуляторная среда де-факто блокирует международных игроков (Nubank, Plata там отсутствуют).'},
  {cat:'13',q:'Почему оценка входа $645 млн считается дешёвой?',a:'1) P/E 9.2x — мультипликатор зрелого банка, а не высокорастущего финтеха. Nubank торгуется по P/E 30-40x. Платишь как за банк, получаешь рост как от финтеха. 2) В 5x дешевле аналогов — Nubank и Plata оценены значительно выше. 3) Потенциал переоценки 7.8x — при оценке как Nubank на IPO.'},
  {cat:'13',q:'Каков потенциал рынка Венесуэлы для финтеха?',a:'Разрушение банковского сектора создало вакуум: 32 млн человек практически без доступа к банковским продуктам. Экономика стабилизируется и долларизируется — долларовый оборот растёт. Penetration rate потребительского кредитования крайне низкий vs Бразилия, Мексика, Колумбия. Весь рост ещё впереди. Cashea — единственный игрок с инфраструктурой.'},
  {cat:'13',q:'Как Cashea монетизирует свою модель?',a:'BNPL (Buy Now Pay Later) / рассрочка: финансирует транзакцию у партнёра-ритейлера, берёт merchant discount rate и/или процентный доход с потребителя. Скоринговая модель определяет лимит и ставку. По мере накопления данных снижается дефолтность, растёт объём одобрений. Потенциал расширения: страхование, переводы, карты — путь супераппа.'},
  {cat:'13',q:'Чем Cashea отличается от Nubank и Plata?',a:'1) Рынок: Nubank и Plata — конкурентные рынки с банковской системой. Cashea — монополист с нулевой конкуренцией. 2) Оценка: Cashea в 5x дешевле по мультипликаторам при структурно лучшей конкурентной позиции. 3) Данные: у Cashea единственная собственная поведенческая база страны; у конкурентов — бюро кредитных историй и альтернативные скоринги.'},
  {cat:'13',q:'Каковы основные риски инвестиции в Cashea?',a:'1) Страновой/политический риск — Венесуэла остаётся авторитарным государством. 2) Валютный риск — несмотря на долларизацию, среда нестабильна. 3) Риск масштабирования — одна страна; экспансия возможна, но не гарантирована. 4) Кредитный риск — при ухудшении экономики дефолтность вырастет. 5) Ликвидность — IPO с нестандартной юрисдикцией требует спецподготовки.'},
  {cat:'13',q:'Почему $25 за акцию является привлекательной точкой входа?',a:'При оценке $645M и потенциале 7.8x цель ~$5B — значительно ниже Nubank ($50+B). $25/акция = P/E 9.2x — цена зрелого консервативного банка. При умеренном росте апсайд существенный; при переоценке к финтех-мультипликаторам (30-40x P/E) потенциал 7.8x реалистичен. Классическая value+growth история.'},
  {cat:'13',q:'Что должно случиться, чтобы потенциал 7.8x реализовался?',a:'Три драйвера: 1) Рост бизнеса — транзакционный объём, новые пользователи, карты/страхование → оценка растёт с выручкой. 2) Переоценка мультипликаторов — переход с P/E 9x к 40-50x (уровень Nubank) при той же прибыли = 4-5x только за переоценку. 3) M&A — крупные финтехи/банки могут купить монополиста с уникальной базой с премией.'},
  {cat:'13',q:'Как Cashea вписывается в стратегию Axevil?',a:'Дополняет портфель иным профилем: прибыльный бизнес с понятной монетизацией (не R&D-стартап), монопольная позиция (не конкурентная гонка в AI), латиноамериканский рынок (не США/Азия). Вход по банковскому мультипликатору, апсайд 7.8x — emerging market premium story. Балансирует deeptech (Skild, Prometheus) и прибыльный нишевой монополизм.'},
  {cat:'14',q:'Объясните бизнес-модель Skild AI — почему она лучше конкурентов?',a:'Аналогия: Microsoft vs Dell в 1990-х. Dell продавал компьютеры (capex, низкая маржа). Microsoft продавал Windows для каждого производителя. Skild — это Microsoft для роботов. Figure/Tesla Optimus — Dell: производят своих роботов, маржа 25-35%, $250K+/робот. Skild лицензирует «мозг» любому производителю: $4-15K развёртывание, маржа 70-85%, capex минимальный. Плюс 700K уже работающих роботов ABB и Universal Robots.'},
  {cat:'14',q:'Что такое VLA-модель и почему это технологический прорыв?',a:'VLA (Vision-Language-Action) — AI-модель, которая воспринимает картинку с камеры, понимает текстовую команду и генерирует точные физические действия. До VLA: программирование каждого движения требовало месяцев инженеров. Skild Brain: освоение новой задачи за часы, без ручного программирования. Ключевые показатели: автономность 96%+, ускорение обучения 60-80%. Роботы становятся универсальными физическими агентами.'},
  {cat:'14',q:'Расскажите о контракте Foxconn — почему он важен?',a:'Контракт март 2026 — первое массовое промышленное применение Skild Brain. Манипуляторы выполняют сборку Nvidia Blackwell в Хьюстоне. Почему важно: 1) Подтверждение технологии в жёстких условиях (высокоточное производство серверов). 2) Foxconn — крупнейший контрактный производитель электроники. Масштабирование = сотни тысяч роботов. 3) Связка Nvidia + Skild Brain. 4) Валидация перед Series C $1.4B.'},
  {cat:'14',q:'Что дало поглощение робо-бизнеса Zebra (апрель 2026)?',a:'Поглощение Fetch Robotics + платформы Symmetry. Четыре преимущества: 1) Symmetry — управление парком роботов через одну систему: полный складской цикл (гуманоиды, четырёхногие, манипуляторы, мобильные платформы). 2) Клиентская база Fetch Robotics. 3) Единственное сквозное складское решение на рынке. 4) Рынок складской автоматизации к 2030 — $40B.'},
  {cat:'14',q:'Как Nvidia усиливает конкурентное преимущество Skild?',a:'Nvidia — стратегический инвестор и поставщик инфраструктуры. Isaac Lab + Cosmos Transfer + Omniverse = 1000x преимущество в объёме обучающих данных. Реальные данные — медленно и дорого. Конкурентам для того же объёма данных — многолетние инвестиции. Дополнительно: приоритетный доступ к чипам, партнёрства с клиентами Nvidia (Foxconn, Dell, HP).'},
  {cat:'14',q:'Почему прогноз роста выручки Skild ($30M→$150M, +400%) реалистичен?',a:'1) Foxconn (март 2026) — оплата per-robot за масштабируемое внедрение. 2) ABB и Universal Robots — 700K манипуляторов; 5-10% конверсия = кратный рост. 3) Поглощение Zebra добавляет существующую выручку Fetch Robotics. 4) CommonSpirit (140+ больниц) — открывает healthcare robotics, TAM $7B к 2030. Рост с $30M до $150M — консервативный сценарий.'},
  {cat:'14',q:'Как устроена ценовая модель Skild и как считается выручка?',a:'Subscription + usage-based: лицензия Skild Brain per-robot. $4-15K/год за робота. Расчёт: 700K роботов ABB+UR, 10% пенетрация = 70K роботов × $5K = $350M/год при марже 70-85%. Только от ABB/UR, без учёта Foxconn, Zebra и медицинского направления. Мультипликатор EV/Revenue 25-30x на IPO 2029 — уровень корпоративного ПО (Salesforce, ServiceNow).'},
  {cat:'14',q:'Кто конкуренты Skild и почему они слабее?',a:'1) Вертикально интегрированные (Figure AI, Tesla Optimus, 1X, Boston Dynamics) — производят роботов + ПО; маржа 25-35%, один робот $250K+. Figure оценён в $39B без выручки vs Skild $14B с $30M. 2) Physical Intelligence (open source) — монетизация под вопросом. 3) Internal teams у ABB/UR/Fanuc — выбирают партнёрство со Skild, не конкуренцию. Ключевое: Skild — единственный с выручкой и hardware-agnostic.'},
  {cat:'14',q:'Каков прогноз выхода Skild на IPO и как рассчитана цель $80B?',a:'Прогноз выручки: $30M (2025) → $150M (2026) → $500M (2027) → $1.3B (2028) → $3B (2029). Мультипликатор EV/Revenue 25-30x (корпоративное ПО: Salesforce 25-35x, ServiceNow 20-30x). Расчёт: $3B × 27x = $81B ≈ $80B. Апсайд от входа Axevil: $80B / $17.95B = 4.5x за ~3 года.'},
  {cat:'14',q:'Какие риски специфичны для Skild AI?',a:'1) Технологический — VLA-модели новые, надёжность в критических средах требует подтверждения в масштабе. 2) Конкурентный от Big Tech (Google DeepMind, Meta FAIR, Microsoft). 3) Риск партнёрств — альянс с ABB/UR не эксклюзивный. 4) Регуляторный — healthcare и оборонные применения требуют сертификации. 5) Риск переноса IPO 2029. 6) Инсорсинг — крупные клиенты могут попытаться разработать собственный «мозг».'},
  {cat:'15',q:'Объясните технологию Prometheus простыми словами.',a:'Аналогия Безоса: «очень-очень современный CAD». Сегодня: инженер вручную рисует деталь в AutoCAD — недели работы. Prometheus: инженер задаёт только цель («турбина 5 МВт, КПД 95%, масса до 2 тонн») — AI сам генерирует оптимальную конструкцию. Плюс цифровой двойник — живая виртуальная копия объекта с данными датчиков в реальном времени. Это замена всего инженерного проектирования AI.'},
  {cat:'15',q:'Что даёт участие Безоса как основателя и оператора?',a:'Безос — активный Co-CEO. Преимущества: 1) Операционная дисциплина — построил Amazon с нуля, создал AWS ($18.5B операционной прибыли/год). 2) Прямой доступ к Blue Origin (тест на двигателях BE-4/BE-7, ракета New Glenn). 3) Amazon — 1 млн складских роботов как испытательный полигон, AWS на льготных условиях. 4) Сеть контактов — доступ к корпоративным клиентам и суверенным фондам. 5) $2B личных денег в Seed.'},
  {cat:'15',q:'Почему промышленный инжиниринг — лучший рынок для AI, чем LLM?',a:'1) Размер: промышленное проектирование $14 трлн vs LLM $300B — разница 47x. 2) Switching costs: перейти к конкуренту = переобучение, переработка данных, риски производства; retention B2B SaaS 90%+. 3) В физической AI почти нет игроков — окно атаки 3-5 лет. 4) Действующие лидеры (ANSYS, Dassault, Synopsys) не могут переписать ПО 1970-90х без каннибализации выручки.'},
  {cat:'15',q:'Расскажите о команде Prometheus — почему она является аргументом?',a:'Co-CEO Безос (инженер, Amazon, Blue Origin). Co-CEO Вик Баджадж (PhD MIT, создал Wing, Waymo, Verily — компании стоимостью $1-45B). William Gass (PhD CMU, экс-OpenAI, co-founder General Agents). Sherjil Ozair (PhD Montreal, экс-DeepMind и Tesla). Советники: Ашиш Васвани и Якоб Ушкорейт — соавторы «Attention Is All You Need» (173K+ цитирований). 120+ исследователей из OpenAI, xAI, DeepMind, Meta, Anthropic, Nvidia.'},
  {cat:'15',q:'Как Prometheus планирует монетизировать платформу?',a:'Три фазы: Фаза 1 (Q4 2026, ~$100M) — сервис симуляций, оплата per-request; старт с оборонными/R&D клиентами. Фаза 2 (2027, $500-700M) — вертикальные продукты, замена ANSYS/Synopsys/Dassault. Фаза 3 (2028+, $2-3B) — интеграция в производственные линии, многолетние контракты. Параллельно: промышленный фонд $100B для скупки активов (BlackRock + JPMorgan).'},
  {cat:'15',q:'Нет выручки, компания меньше 2 лет — как обосновать оценку $48B?',a:'1) Аналог: Anthropic в феврале 2024 — $18.4B при $0.5B ARR → через 18 мес. $61.5B при $3B ARR. Prometheus привлёк $16.2B за 5 мес. до первого продукта от BlackRock, JPMorgan, суверенных фондов. 2) Замена ANSYS/Synopsys/Dassault = $50B платящего рынка; 10% захвата = $5B выручки × 50x = $250B. 3) Founder premium — Безос единственный серийный основатель компаний на $100B+.'},
  {cat:'15',q:'Как оценить риск того, что Prometheus не взлетит?',a:'Факторы снижения риска: $16.2B капитала = 10-15 лет взлётной полосы; прямые якорные клиенты через Blue Origin и Amazon сокращают цикл продаж; компания выходит из стелс (первое публичное описание продукта 20 мая 2026). Риски: физическая AI сложнее текстовой; конкуренция Big Tech; регуляторика в оборонном секторе. Итог: ставка с потенциалом 10x, профиль deep-tech венчура.'},
  {cat:'15',q:'Сравните три сделки Axevil — Cashea, Skild AI, Prometheus — по риск/доходности.',a:'Cashea: риск НИЗКИЙ (прибыльный бизнес, монополия), доходность 7.8x — value play, emerging market. Skild AI: риск СРЕДНИЙ (технология доказана, выручка есть, масштабирование продолжается), доходность 4.5x — growth play, market leadership. Prometheus: риск ВЫСОКИЙ (нет выручки, категория создаётся), доходность 10x+ — deep-tech venture. Оптимальная аллокация: все три, с большим весом Skild AI как наиболее сбалансированной.'},
  {cat:'15',q:'Какой ключевой вопрос должен задать себе инвестор перед входом?',a:'Три вопроса: 1) «Понимаю ли я, почему именно эта компания победит?» — Cashea: data moat + регуляторный барьер; Skild: hardware-agnostic + 700K роботов; Prometheus: Безос + $16.2B + закрытость категории. 2) «Готов ли я заморозить капитал на 3-5 лет?» — Pre-IPO неликвидны. 3) «Это диверсифицирующая позиция?» — Axevil рекомендует не более 10-20% портфеля в Pre-IPO.'},

  // --- Блок 16: Коммерческий директор ---
  {cat:'16',q:'Каков средний чек инвестора и как он менялся с ростом AUM?',a:'Средний чек = AUM / кол-во клиентов. $130M / 1000+ клиентов ≈ $130K+ средний чек. Рост AUM с $100M до $130M при той же базе клиентов говорит об увеличении повторных инвестиций и размера чека, а не только о росте новых клиентов. Сигнал здоровья платформы — retention + upsell работают.'},
  {cat:'16',q:'Почему порог входа именно $10K, а не $5K или $50K?',a:'$10K — психологически значимая сумма: достаточно велика, чтобы инвестор воспринимал её серьёзно и прошёл KYC/аккредитацию, но достаточно мала, чтобы не конкурировать с порогами $50K+ у традиционных платформ. При $5K экономика SPV нарушается — слишком много мелких участников с одинаковыми операционными затратами. При $50K сужается потенциальная аудитория.'},
  {cat:'16',q:'Как Axevil конкурирует с Republic, AngelList, Forge Global и Linqto по доступу к Pre-IPO?',a:'Ключевые отличия: 1) Axevil фокусируется на late-stage (Series C+), а не ранних стадиях — меньший риск, более короткий горизонт выхода. 2) Юридическая структура: Delaware SPV с регистрацией SEC Form D vs. квази-инструменты у части конкурентов. 3) Ориентация на рынки СНГ/MENA через Axevil Capital KZ Ltd — нишевое конкурентное преимущество в непокрытой географии. 4) Партнёрская сеть как канал дистрибуции вместо прямого маркетинга.'},
  {cat:'16',q:'Что происходит, если партнёр переводит клиентов к конкурирующей платформе?',a:'Ключевые защитные механизмы: 1) Клиентская база в CRM Axevil Pro принадлежит платформе, не партнёру. 2) Исторический трек-рекорд сделок (Confluent, Circle, Anthropic) — конкурент не может предложить этот актив. 3) Эксклюзивный доступ к аллокациям в горячих сделках — партнёр теряет pipeline при уходе. 4) Долгосрочные отношения с инвесторами через портфельный трекинг и K-1.'},
  {cat:'16',q:'Как выглядит типичная воронка от первого касания до первой инвестиции?',a:'Типичный цикл: 1) Первый контакт через партнёра или контент (pitch deck/вебинар). 2) Квалификация: аккредитованный статус, география, размер капитала. 3) Ознакомление с материалами по сделке (PPM, DD, pitch). 4) Вопросы/возражения — обычно 2-4 звонка. 5) KYC + подписание документов. 6) Capital Call + перевод. Средний цикл: 3-6 недель от первого контакта до оплаты. Основной отвал — на этапе KYC и первого изучения структуры.'},
  {cat:'16',q:'Каков процент инвесторов, делающих повторные инвестиции?',a:'Публичных данных нет, но косвенный индикатор: AUM $130M при 1000+ клиентах даёт средний чек $130K+, что значительно выше минимального порога $10K. Это означает, что значительная часть инвесторов либо вложила больше порога с первой инвестиции, либо делала повторные вложения. Retention — ключевая метрика для платформы: каждая успешно закрытая сделка (Circle 200%, Anthropic 240%+) прямо конвертируется в повторные инвестиции.'},
  {cat:'16',q:'Как Axevil обрабатывает ситуацию, когда инвестор хочет вернуть средства до Capital Call?',a:'До подписания SPV Agreement — инвестор вправе отказаться без штрафных санкций. После подписания Subscription Agreement и до Capital Call — возможен отзыв заявки (зависит от Operating Agreement конкретной SPV). После Capital Call и перевода средств — средства вложены в сделку, ранний выход невозможен без покупателя на вторичном рынке. Axevil чётко доносит это на этапе онбординга.'},
  {cat:'16',q:'Что Axevil предлагает инвестору с собственным Tier-1 нетворком?',a:'Три аргумента: 1) Диверсификация доступа — Axevil может открыть сделки в компаниях, аллокация в которых недоступна даже через личные контакты (через совместный пайплайн с Finsight Ventures). 2) Операционная разгрузка — юридическое оформление, KYC, K-1, SPV администрирование берёт на себя Axevil. 3) Минимальный чек $10K позволяет диверсифицировать через несколько сделок без концентрации крупного чека в одной позиции.'},
  {cat:'16',q:'Как устроена система вознаграждения партнёров?',a:'Партнёры получают комиссию за привлечённые инвестиции (referral fee), которая структурируется как часть front-end fee (до 5%). Конкретная шкала вознаграждения — не раскрывается публично, зависит от объёма. Дополнительно: партнёры получают доступ к Axevil Pro — эксклюзивный пайплайн, DD-материалы, AI-CRM. Это операционная ценность, которую партнёр не может получить самостоятельно.'},
  {cat:'16',q:'Как Axevil управляет репутационным риском, если одна из сделок покажет плохой результат?',a:'Ключевые элементы управления репутацией: 1) Структурная прозрачность — SPV изолированы, плохой результат одной сделки не затрагивает другие. 2) Честное раскрытие рисков в PPM. 3) Дифференциация: «Axevil — платформа доступа, не гарант результата» (инвестор самостоятельно принимает решение). 4) Трек-рекорд: 4 реализованных выхода с положительным результатом создают буфер репутации.'},
  {cat:'16',q:'Почему Axevil использует отдельные SPV, а не один мультистратегийный фонд?',a:'Преимущества SPV-модели: 1) Инвестор сам выбирает конкретные компании — прозрачность и контроль. 2) Изоляция рисков — провал одной компании не размывает другие позиции. 3) Регуляторно проще: Regulation D Rule 506(b) под каждую SPV без требования публичного раскрытия. 4) Гибкость по срокам и размерам позиций. Недостаток: сложнее для инвестора управлять несколькими SPV, но Axevil App решает эту боль.'},
  {cat:'16',q:'Каков план выхода на институциональных инвесторов — family offices и endowments?',a:'Текущий фокус — HNWI и wealth managers через партнёрскую сеть. Следующий шаг: Axevil Pro с Whitelabel API (2026-2027) открывает возможность для family offices использовать инфраструктуру Axevil для собственных клиентов. Партнёрство с Finsight Ventures ($550M AUM) уже является мостом к institutional-grade инвесторам. Регулирование МФЦА в Казахстане открывает дорогу к суверенным фондам СНГ.'},
  {cat:'16',q:'Что происходит, если в период сбора средств не набирается минимальная аллокация?',a:'Если аллокация не закрывается — Capital Call не выставляется, средства не блокируются, инвесторы не несут потерь. SPV может быть закрыта без осуществления инвестиции. Это стандартная практика для private placement. Риск для Axevil: репутационные потери и операционные затраты на закрытый раунд. Митигация: приоритет получают горячие сделки, по которым уже есть подтверждённый интерес.'},
  {cat:'16',q:'Как Axevil объясняет клиенту разницу между MOIC и IRR, когда сроки неизвестны?',a:'MOIC (Multiple of Invested Capital) — абсолютный множитель: 4.5x означает, что $100K превращаются в $450K. IRR — годовая доходность с учётом времени: 4.5x за 3 года = ~65% IRR; за 5 лет = ~35% IRR. Когда точный срок неизвестен, MOIC более честный показатель. Axevil заявляет целевой MOIC (4.5x для Skild AI) и ориентировочный IRR при базовом сценарии выхода. Важно: IRR на реализованных сделках Axevil считается от Capital Call до выплаты.'},
  {cat:'16',q:'Как Axevil защищает аллокацию в горячих сделках от монополизации крупными инвесторами?',a:'Механизмы: 1) При ограниченной аллокации — приоритет получают инвесторы, подтвердившие и оплатившие первыми (first-come, first-served). 2) В зависимости от Operating Agreement SPV может устанавливать максимальный размер вклада одного инвестора. 3) Партнёрская сеть из 150+ участников обеспечивает широкую дистрибуцию без монополизации.'},
  {cat:'16',q:'Как Axevil работает с клиентами, у которых USD-транзакции ограничены?',a:'Два пути: 1) Криптовалюта (USDT/USDC) — легальный способ обхода ограничений, принимается с комиссией 1.5% за конвертацию. Делавэр признал крипто-транзакции с 2017 года. 2) Структура через Axevil Capital KZ Ltd (МФЦА, Казахстан) — отдельная юрисдикция для инвесторов СНГ с иными расчётными возможностями. Выплаты только на зарубежные счета (не в РФ).'},
  {cat:'16',q:'Как Axevil масштабирует партнёрскую сеть с 150 до 1000 партнёров?',a:'Предполагаемая стратегия: 1) Систематизация онбординга через Axevil Pro — самообслуживание без ручного вмешательства. 2) Выход на новые географии (MENA, ЮВА, ЕС) с соответствующими лицензиями. 3) Whitelabel API (2026-2027) — превращает крупных брокеров и wealth managers в встроенных партнёров. 4) Образовательный контент через Marketing Hub снижает порог входа для нового партнёра.'},
  {cat:'16',q:'Как Axevil позиционируется в MENA — другая регуляторная и культурная среда?',a:'Ключевые адаптации: 1) Юридическая инфраструктура в MENA в стадии финализации (2026-2027 по roadmap). 2) Структура МФЦА в Казахстане уже частично покрывает эту географию. 3) Культурные нюансы: в MENA значимы личные отношения и доверие — роль партнёрской сети критична. 4) Суверенные фонды Сингапура и Ближнего Востока уже являются инвесторами Prometheus, что создаёт контекст доверия.'},
  {cat:'16',q:'Что Axevil предлагает партнёру, у которого уже есть собственная CRM?',a:'Ценность Axevil Pro — не в CRM как таковой, а в: 1) Эксклюзивном пайплайне сделок, которых нет у партнёра самостоятельно. 2) DD-материалах и pitch deck-ах, которые партнёр не может подготовить самостоятельно. 3) Юридической и операционной инфраструктуре — SPV, KYC, Form D, K-1 — без которых партнёр не может провести сделку. 4) AI-ассистент для клиентов партнёра («Клаудия»).'},
  {cat:'16',q:'Что делает Axevil, если крупный партнёр хочет Whitelabel уже сейчас, до 2027?',a:'По roadmap Whitelabel и API-интеграции запланированы на 2026-2027. До этого — кастомные договорённости возможны для стратегически важных партнёров. Прецедент: партнёрство с Finsight Ventures уже является формой co-brand relationship. Риск: обещать Whitelabel без готовой инфраструктуры — значит взять на себя операционный обязательство. Ответ: «в очереди приоритетов, готовы обсудить custom arrangement».'},
  {cat:'16',q:'Как Axevil конкурирует с локальными брокерами СНГ, предлагающими «Pre-IPO» через неформальные схемы?',a:'Аргументы против неформальных схем: 1) У «брокеров» инвестор получает квази-инструмент без прямого юридического права на акции. 2) Нет регистрации в SEC — нет публичного реестра сделки. 3) Нет изоляции рисков — посредник может обанкротиться, унеся средства. 4) Нет налоговой документации (K-1) — проблемы с декларированием дохода. Axevil: Delaware структура, SEC Form D, Capital Account Statement — всё верифицируемо публично.'},
  {cat:'16',q:'Как Axevil объясняет новому клиенту разницу между SPV и структурной нотой банка?',a:'Структурная нота: банк выпускает долговой инструмент, привязанный к стоимости акций. Инвестор — кредитор банка, не акционер компании. При банкротстве банка инвестор в очереди кредиторов. SPV Axevil: инвестор — бенефициар юридического лица, которое напрямую владеет акциями компании. SPV изолирована от Axevil Capital LLC. Акции хранятся на балансе SPV, а не на балансе Axevil. Ключевое различие: реальное vs. синтетическое владение.'},
  {cat:'16',q:'Как Axevil работает с инвестором, вложившим $2M — есть ли VIP-условия?',a:'Комиссия на входе «до 5%» уменьшается при больших объёмах — это прямо указано в документации. При $2M вход: скорее всего 1-2% (экономия $60-80K vs. стандартных 5%). Возможны также: приоритетный доступ к аллокации, персональный менеджер, first-look на новые сделки. Конкретная шкала — предмет индивидуальных переговоров. Это стандартная практика для institutional-grade сумм.'},
  {cat:'16',q:'Как Axevil работает с инвестором, у которого одна из сделок показала минус?',a:'Структурный ответ: 1) SPV изолированы — убыток по одной позиции не затрагивает другие. 2) К-1 отражает убыток, который может быть использован для налоговой оптимизации в стране резидентства. 3) Axevil честно раскрыл риски в PPM — инвестор подписал, осознавая их. 4) Фокус на долгосрочном портфеле: один минус при нескольких плюсах (256%, 240%, 200%) — это нормальное распределение результатов в венчурном портфеле.'},
  {cat:'16',q:'Если инвестор уже имеет брокерский счёт с Pre-IPO акциями — зачем ему Axevil?',a:'Зависит от того, что именно имеет брокер. Если это квази-инструмент (нота, дериватив) — разница принципиальная (см. вопрос про SPV vs. нота). Если реальные акции — Axevil даёт: 1) Диверсификацию по компаниям (30+) и секторам. 2) Снижение минимального чека для каждой позиции. 3) Операционную разгрузку (KYC, K-1, трекинг). 4) Доступ к сделкам, недоступным через брокера (Finsight pipeline).'},
  {cat:'16',q:'Как устроена математика комиссии при реинвестировании выплат?',a:'Текущая структура не предусматривает автоматического реинвестирования — каждая SPV отдельна, выплаты поступают инвестору напрямую. При реинвестировании в новую SPV: front-end fee 5% взимается снова с новой суммы. Это отличается от классических фондов с reinvestment provisions. Преимущество: инвестор сам выбирает, в какую сделку реинвестировать. Недостаток: каждый реинвест несёт повторную комиссию на входе.'},
  {cat:'16',q:'Как Axevil объясняет, что carry 20% взимается с дохода, а не с MOIC сверх 1x?',a:'Разница принципиальная при разных сценариях: Если инвестор вложил $100K, итог $450K, carry = 20% от ($450K - $100K) = $70K, выплата $380K (3.8x чистый). Это стандартная модель «20% от прибыли». Если бы carry считался от итоговой суммы — это было бы 20% от $450K = $90K (агрессивнее). Axevil использует первую, более выгодную для инвестора модель. Важно донести: carry применяется только при прибыльном выходе.'},
  {cat:'16',q:'Как Axevil планирует работать в юрисдикциях, где структура Delaware SPV плохо воспринимается?',a:'Стратегия двух юрисдикций: 1) Delaware/SEC структура для инвесторов из стран, признающих американское право (большинство развитых рынков). 2) МФЦА (Казахстан) — для инвесторов СНГ, которым Delaware юридически или операционно сложен. 3) MENA-лицензирование в roadmap 2026-2027. 4) Параллельные юридические структуры под разные юрисдикции без изменения портфельных компаний.'},
  {cat:'16',q:'Как Axevil работает с клиентом, который спрашивает: «Почему нет audited track record в публичном виде?»',a:'Честный ответ: Axevil — Exempt Reporting Adviser (ERA), не Registered Investment Adviser (RIA). ERA не обязан публиковать полный audited track record так же, как RIA. Что есть публично: Form D по каждой сделке на sec.gov/edgar (объём, количество инвесторов). Что есть для инвесторов: Capital Account Statement, K-1 из независимой бухгалтерии (Swampscott). Что есть в маркетинге: кейсы с названными IRR — это заявленные, не audited цифры.'},

  // --- Блок 17: Head of Investments ---
  {cat:'17',q:'Как Axevil получает доступ к аллокации в Tier-1 сделках — кто продаёт и почему?',a:'Три типа продавцов: 1) Ранние сотрудники и основатели с опционами — хотят ликвидность до IPO. 2) Early-stage VC-фонды — реализуют часть позиции для возврата LP. 3) Family offices, купившие на ранних стадиях — диверсифицируют. Axevil получает доступ через: собственный нетворк, партнёрство с Finsight Ventures ($550M AUM, 20 лет в рынке), прямые отношения с брокерами вторичного рынка. ROFR-процедура (до 45 дней) является частью стандартного процесса.'},
  {cat:'17',q:'Как устроена ценовая дискуссия с продавцом — есть ли торг или цена фиксируется по раунду?',a:'На вторичном рынке цена — предмет переговоров. Ориентир: post-money последнего раунда (benchmark). Продавцы, которым нужна срочная ликвидность, соглашаются на дисконт к раунду (secondary discount). В горячих сделках (Anthropic, SpaceX) продавцы удерживают цену у или выше раунда (secondary premium). Axevil указывает «оценку входа в сделку» — это фактическая цена покупки SPV, а не раундовая оценка.'},
  {cat:'17',q:'Как Axevil оценивает «справедливую цену» входа — методология?',a:'Три уровня: 1) Anchor: post-money последнего раунда с известными Tier-1 инвесторами — наиболее объективный ориентир. 2) Comparable transactions: цены недавних вторичных сделок в той же компании (через данные Forge, EquityZen, внутренний нетворк). 3) Forward-looking: DCF или EV/Revenue исходя из прогноза выручки при IPO — устанавливает максимально приемлемую цену входа. Если implied IRR при «честной» оценке выхода < 30% — сделка не берётся.'},
  {cat:'17',q:'Что происходит, если после Capital Call компания отказывает в трансфере акций?',a:'Это операционный риск, учитываемый на стадии DD. Механизмы защиты: 1) ROFR-процедура проводится до Capital Call — если есть сомнения в одобрении, деньги не запрашиваются. 2) Форвардный контракт или вышестоящая SPV используются, когда прямой трансфер ограничен. 3) Если отказ произошёл после Capital Call — средства возвращаются инвесторам. 4) Operating Agreement SPV описывает такой сценарий. Это редкая ситуация: Axevil согласовывает сделку с компанией до начала сбора средств.'},
  {cat:'17',q:'Как Axevil управляет концентрационным риском в портфеле?',a:'На уровне платформы: 30+ компаний в портфеле across 7 вертикалей — диверсификация обеспечена. На уровне инвестора: каждый инвестор самостоятельно выбирает сделки. Axevil рекомендует не концентрировать более 10-20% портфеля в Pre-IPO в целом. SPV-модель по своей природе изолирует риски: плохой результат одной позиции не затрагивает другие. Нет cross-collateralization между SPV.'},
  {cat:'17',q:'Что такое NAV overstatement risk в Pre-IPO контексте?',a:'NAV overstatement — риск завышения стоимости портфеля относительно реальной рыночной цены. В Pre-IPO: оценка фиксируется по последнему раунду (post-money), который может быть «раздутым» участием стратегических инвесторов с нестандартными мотивами. Axevil митигирует: 1) Инвестирует только в компании с Tier-1 фондами (Sequoia, SoftBank, Lightspeed) — их оценки методологически строже. 2) Указывает «оценку входа» как фактическую цену покупки, а не раундовую оценку.'},
  {cat:'17',q:'Чем обоснован выбор Series C+ как минимального порога — почему не Series B?',a:'Series B — слишком ранняя стадия: высокий технологический и рыночный риск, горизонт до выхода 5-8 лет, высокая вероятность down round или провала. Axevil позиционирует себя как late-stage: горизонт 1-3 года до выхода, компания с подтверждённой выручкой или бизнес-моделью, значительный уже созданный рост. Series C+ = достаточно «зрелая» стадия для квалифицированных, но не institutional-grade инвесторов. При Series D+ — риск снижается, но снижается и апсайд.'},
  {cat:'17',q:'Как SPV как минорный акционер получает информационные права и pro-rata?',a:'В большинстве сделок SPV не получает информационных прав автоматически — они принадлежат инвесторам раунда, а не вторичным покупателям. Axevil работает с этим через: 1) Вышестоящую SPV, которая уже является акционером раунда (и имеет права инвестора). 2) Прямое согласование с компанией при покупке у основателей (иногда компания предоставляет ограниченные информационные права). 3) Публичные источники: Form D, пресс-релизы о раундах, отраслевые данные.'},
  {cat:'17',q:'Что происходит с инвестицией Axevil при down round портфельной компании?',a:'Down round — снижение оценки в следующем раунде. Эффект для SPV: 1) Anti-dilution provisions (если есть в корпоративном договоре) могут частично защитить долю. 2) NAV позиции пересчитывается по новой оценке — Capital Account Statement инвестора отразит снижение. 3) Реализованный убыток возникает только при продаже ниже цены входа. 4) Down round — не конец истории: компания продолжает работать, выход по IPO/M&A в будущем возможен выше цены входа.'},
  {cat:'17',q:'Как устроён waterfall при распределении средств инвесторам при выходе?',a:'Стандартный waterfall SPV Axevil: 1) Return of capital: каждый инвестор получает вложенную сумму (100% вклада без учёта front-end fee). 2) Preferred return (если есть в Operating Agreement): фиксированный процент до распределения carry. 3) Carried interest: 20% от прибыли сверх первоначальных инвестиций идёт управляющей компании. 4) Остаток: распределяется пропорционально долям инвесторов. Front-end fee (5%) взимается при входе, не из выплат.'},
  {cat:'17',q:'Как Axevil оценивает привлекательность сделки — есть ли формальная scorecard?',a:'Формальной публичной scorecard нет, но логика оценки: 1) Implied IRR при базовом сценарии выхода > 30-40%. 2) Компания с Tier-1 бэкерами (Sequoia, SoftBank, Lightspeed) как сигнал качества DD. 3) Горизонт выхода 1-3 года (late-stage). 4) Масштабируемая бизнес-модель с подтверждёнными метриками. 5) Доступность аллокации по приемлемой цене. 6) Юридическая чистота сделки (ROFR, transfer restrictions). Не менее важно: операционная реализуемость сделки.'},
  {cat:'17',q:'Что такое «option pool shuffle» и как он размывает долю SPV?',a:'Option pool shuffle — расширение пула опционов для сотрудников в рамках нового раунда. Новые опционы выпускаются до раунда, размывая всех существующих акционеров (включая SPV) до входа новых инвесторов. Результат: effective entry price для нового инвестора растёт, а доля существующих SPV снижается. Axevil учитывает это при расчёте diluted ownership. В Series C+ это предсказуемый риск — на практике 5-15% dilution per round закладывается в модель.'},
  {cat:'17',q:'Как Axevil хеджирует валютный риск при конвертации USDT→USD и обратно?',a:'Структурная позиция: все инвестиции номинированы в USD. Крипто принимается как USDT/USDC (стейблкоины, привязанные к USD) — курсовой риск минимален при конвертации. Операционный риск: 1.5% комиссия за конвертацию через Binance.US/Coinbase — это не хедж, а транзакционные издержки. При выплатах: средства возвращаются в USD или USDT/USDC по курсу на дату выплаты. Валютный риск инвестора — в его домашней валюте vs. USD.'},
  {cat:'17',q:'Почему Axevil использует отдельные SPV, а не closed-end fund?',a:'Closed-end fund (традиционный PE/VC фонд): фиксированный срок, управляющий решает всё, инвестор не выбирает компании, management fee 2%/год. Преимущества SPV-модели: 1) Инвестор выбирает конкретные позиции. 2) Нет management fee (только front-end + carry). 3) Гибкость по суммам и срокам. 4) Регуляторно проще: Regulation D без публичной регистрации. 5) Масштабируемость: неограниченное количество SPV под разные сделки.'},
  {cat:'17',q:'Каков механизм lock-up: кто устанавливает срок?',a:'Lock-up устанавливается андеррайтером IPO в договоре с компанией и её акционерами. Стандарт: 180 дней (6 месяцев) для инсайдеров и крупных акционеров. SPV Axevil как акционер портфельной компании подпадает под lock-up наравне с другими pre-IPO акционерами. Срок фиксируется в underwriting agreement — Axevil не может его изменить. На практике (кейс Circle): выход в ноябре 2025 после IPO в июне 2025 = ~5 месяцев lock-up.'},
  {cat:'17',q:'Как устроена передача акций с SPV на брокерский счёт инвестора после IPO?',a:'Технический процесс: 1) После IPO акции переходят из private в public форму (DTC-eligible). 2) SPV выставляет инструкцию на трансфер акций через DTC/DTCC на брокерский счёт инвестора. 3) Брокер инвестора должен быть совместим с DTC (практически все международные брокеры). 4) Процесс занимает несколько дней. 5) До окончания lock-up трансфер возможен, но акции остаются заблокированными у нового брокера. Альтернатива: SPV продаёт акции и выплачивает USD.'},
  {cat:'17',q:'Что происходит при stock split или reverse split портфельной компании до IPO?',a:'Stock split: количество акций кратно увеличивается, цена акции кратно снижается, стоимость позиции не меняется. Reverse split: обратный эффект. В обоих случаях: 1) Capital Account Statement пересчитывается — новое количество акций при новой цене. 2) Итоговая стоимость доли инвестора не меняется. 3) Axevil уведомляет инвесторов. Это стандартная корпоративная процедура, не влияющая на экономику инвестиции.'},
  {cat:'17',q:'Как Axevil работает с anti-dilution provisions в SPV Agreement?',a:'Anti-dilution provisions защищают от down round: weighted average или full ratchet корректируют цену конверсии для preferred shareholders. SPV Axevil, как правило, владеет common shares (купленные на вторичном рынке у сотрудников/основателей) — anti-dilution provisions применяются только к preferred shares из официальных раундов. Исключение: если SPV инвестирует в рамках нового раунда (получает preferred) — права применяются. Это важный нюанс: common shares не имеют anti-dilution.'},
  {cat:'17',q:'Есть ли у Axevil собственные co-invest позиции или только клиентские SPV?',a:'Публичной информации о balance sheet investments Axevil Capital LLC нет. По модели бизнеса: Axevil — управляющая компания, зарабатывающая на комиссиях, а не на собственных позициях. Это избегает конфликта интересов (managing entity не конкурирует с клиентами за аллокацию). Для выравнивания интересов используется carry structure: Axevil зарабатывает 20% от прибыли — прямой стимул к максимизации доходности для клиентов.'},
  {cat:'17',q:'Как Axevil принимает решение о частичном vs полном выходе?',a:'Зависит от нескольких факторов: 1) Lock-up: в период lock-up продажа невозможна — только полный выход после окончания. 2) Ликвидность рынка: если торговый объём достаточен, SPV может продавать частями. 3) Запросы инвесторов: часть инвесторов могут предпочесть перевод акций на брокерский счёт (долгосрочное удержание). 4) Рыночная конъюнктура: при сильном рынке — продажа сразу после lock-up; при слабом — возможна пауза. Кейс Circle: полный выход в ноябре 2025.'},
  {cat:'17',q:'Как Axevil работает при дефолте инвестора по Capital Call?',a:'Дефолт по Capital Call (инвестор подписал, но не перевёл средства): 1) Operating Agreement предусматривает механизм dilution или exclusion для defaulting investor. 2) Другие инвесторы SPV могут докупить долю дефолтировавшего на согласованных условиях. 3) SPV может уменьшить размер инвестиции и закрыть без дефолтировавшего. 4) Юридические последствия зависят от условий Subscription Agreement. Это редкость на практике — Axevil собирает подтверждения до Capital Call.'},
  {cat:'17',q:'Как Axevil управляет информационной асимметрией между инсайдерами и инвесторами?',a:'Регуляторный контекст: Axevil торгует на secondary market — продавец (инсайдер) может знать больше, чем Axevil. Механизмы: 1) SPV Agreement содержит representations продавца об отсутствии инсайдерской информации. 2) DD включает публично верифицируемые данные (Form D, пресс-релизы, раундовые оценки). 3) Дисклеймер в PPM: инвестор осознаёт ограниченность информации. 4) Статус ERA не требует раскрытия, которое требуется от RIA. Полная защита от инсайдерской асимметрии невозможна — это риск secondary market.'},
  {cat:'17',q:'Что такое tag-along rights и есть ли они у SPV?',a:'Tag-along rights — право миноритарного акционера продать акции на тех же условиях, что и мажоритарный. Для SPV Axevil: зависит от того, что прописано в корпоративном договоре портфельной компании и условиях трансфера акций. Common shares с вторичного рынка часто не имеют tag-along автоматически. При покупке через вышестоящую SPV или в рамках раунда (preferred) — права более защищены. Это проверяется при юридическом DD каждой сделки.'},
  {cat:'17',q:'Как Axevil обеспечивает прозрачность оценки между раундами?',a:'Между раундами: 1) Оценка фиксируется по последнему раунду (post-money) — это «официальная» NAV. 2) Ежеквартальные обновления в Axevil App: если нет нового раунда, оценка не пересчитывается (стабильная). 3) При новом раунде — NAV обновляется по новой оценке (вверх при up round, вниз при down round). 4) Аналитические комментарии по портфельным компаниям публикуются в реальном времени. Честный ответ: между раундами — оценка статична, это особенность private markets.'},
  {cat:'17',q:'Как Axevil работает с ситуацией, когда после lock-up акции упали на 60%?',a:'Реальный кейс-анализ: если вход был по оценке $17.95B (Skild AI), IPO при $30B, lock-up закончился, цена упала до $12B — SPV продаёт с убытком к IPO-оценке, но с прибылью к цене входа. Стратегия зависит от: 1) Фундаментальных причин падения (временная волатильность vs. структурный кризис). 2) Остаточного потенциала компании. 3) Предпочтений инвесторов SPV. Axevil не обязан продавать сразу — Operating Agreement определяет механизм принятия решений.'},

  // --- Блок 18: Head of Investment Analysis ---
  {cat:'18',q:'Как верифицировать выручку Skild AI $30M — это ARR, NRR или разовые контракты?',a:'Ключевые вопросы: 1) ARR (Annual Recurring Revenue) vs. TCV (Total Contract Value) — первое предпочтительно для SaaS оценки. 2) Если $30M — это NRR, реальная ARR может быть меньше (при churn) или больше (при expansion). 3) Источники верификации: Series C инвесторы (SoftBank, Nvidia, Sequoia) провели full DD — их участие является косвенным подтверждением. 4) Контракт Foxconn (март 2026) и ABB/UR альянс — якорные клиенты, дающие подтверждение. Публичной финансовой отчётности нет — это риск pre-IPO инвестиций.'},
  {cat:'18',q:'Чем обоснован мультипликатор 25-30x EV/Revenue для Skild AI?',a:'Обоснование: 1) Аналоги: Salesforce торгуется 25-35x EV/Revenue, ServiceNow 20-30x — зрелые корпоративные SaaS компании. 2) Skild — software-only, маржинальность 70-85% — даёт право на SaaS-мультипликатор. 3) Если бы Skild рассматривался как традиционный производитель роботов (ABB, Fanuc) — мультипликатор был бы 5-10x. Именно hardware-agnostic модель обосновывает premium к robotics. 4) Риск: если до IPO 2029 рынок сожмётся (rate environment, tech selloff) — мультипликатор может быть 15-20x, что снижает апсайд до 2.5-3x.'},
  {cat:'18',q:'Почему оценка входа Prometheus $48B при нулевой выручке?',a:'Обоснование через три метода: 1) Аналог: Anthropic привлекал при $18.4B при минимальной выручке. Prometheus привлёк $16.2B от институциональных инвесторов (BlackRock, JPMorgan, суверенные фонды) — это market-clearing price от профессионалов. 2) Founder premium: Безос — единственный серийный основатель компаний $100B+. Рынок платит за трек-рекорд. 3) Addressable market $14 трлн оправдывает высокую входную оценку если захват рынка хотя бы 1% = $140B выручки. Риск: при провале — полная потеря.'},
  {cat:'18',q:'Circle IPO дал +168% к цене IPO — значит Pre-IPO апсайд был небольшим?',a:'Это верный вопрос. Разбор: Axevil вошёл при оценке $5.9B. IPO прошло на уровне ~$9B ($31/акция). Первый день: $83.23 (+168% к цене IPO) ≈ оценка $24B. Выход в ноябре 2025 — конкретная цена не раскрыта, но «200% IRR» при сроке ~18 месяцев означает MOIC ~3x, то есть выход при оценке ~$18B. Реальный апсайд Pre-IPO: вход $5.9B, выход ~$18B = 3x MOIC. Именно это и является Pre-IPO преимуществом — вход до IPO при более низкой оценке.'},
  {cat:'18',q:'Как рассчитать IRR при переносе IPO Skild с 2029 на 2031?',a:'Базовый сценарий: вход 2026, выход 2029, апсайд 4.5x, горизонт 3 года → IRR ≈ 65%. Сценарий переноса: тот же апсайд 4.5x, горизонт 5 лет → IRR ≈ 35%. При переносе на 7 лет: IRR ≈ 24%. Вывод: каждый дополнительный год существенно снижает IRR при том же MOIC. Это ключевой риск late-stage инвестиций — «ловушка ликвидности». Axevil декларирует IPO 2029 как target, не гарантию.'},
  {cat:'18',q:'Как считается IRR Axevil с учётом J-curve effect?',a:'J-curve: в первые 12-24 месяца IRR отрицателен — капитал вложен, выхода нет, комиссии уплачены. Реальный IRR на Confluent с J-curve: Capital Call март 2021, IPO июнь 2021, выход ноябрь 2021 — очень короткий J-curve (~3 месяца). На Anthropic: Capital Call апрель 2024, частичный выход январь 2026 — J-curve ~6 месяцев до первых признаков роста оценки. Заявленный «256% IRR» считается от Capital Call до выплаты — это корректная методология. Вопрос: включён ли lag на документацию (ROFR, Form D)?'},
  {cat:'18',q:'Как вы моделируете конкурентное давление на маржу Skild при входе open-source решений?',a:'Сценарный анализ: 1) Physical Intelligence (open-source) уже существует — Skild конкурирует с ним сейчас при маржинальности 70-85%. Значит, open-source сам по себе не убивает маржу. 2) Защита маржи Skild: data flywheel (чем больше роботов — тем лучше модель), enterprise contracts (switching costs), Foxconn-контракт (production-grade reliability сложно воспроизвести). 3) Риск: если Google DeepMind выпустит robotic foundation model в Omniverse/Isaac — это прямая угроза. Вероятность: высокая. Но timeline: 2-3 года, что даёт Skild окно.'},
  {cat:'18',q:'Что произойдёт с оценкой Prometheus, если Безос выйдет как CEO в первые 3 года?',a:'Founder premium составляет значительную часть оценки $48B — оценить точно сложно, но аналог: уход Jobs из Apple в 1985 vs. 1997 (возврат). Механизмы защиты: 1) $16.2B на счету — runway 10-15 лет, команда из 120+ исследователей продолжает работу. 2) Вик Баджадж (Co-CEO) остаётся — он создал Waymo, Wing, Verily. 3) Совет директоров (Дэйв Лимп, CEO Blue Origin) обеспечивает continuity. Оценка, вероятно, упадёт на 30-50% при уходе Безоса. Это key-man risk, который нельзя игнорировать.'},
  {cat:'18',q:'Если Skild при IPO 2029 имеет $3B выручки и 80% маржу — оценка $80B = 36x EBITDA. Это дорого?',a:'Контекст: 36x EBITDA для высокорастущего SaaS на момент IPO — это не дорого по меркам 2021 рынка, но выше среднего для 2024-2025. Сравнение: Salesforce при пике торговался 60x+ EBITDA. ServiceNow: 40-50x. Текущий рынок (2025-2026): premium SaaS 25-35x EBITDA. Для роботики-SaaS категории прецедентов нет — рынок будет устанавливать мультипликатор впервые. Риск compression: если к 2029 рынок нормализуется к 20-25x, оценка Skild = $45-56B → апсайд от Axevil входа 2.5-3.1x, а не 4.5x.'},
  {cat:'18',q:'Cashea торгуется по P/E 9.2x — почему рынок дисконтирует так сильно vs Nubank 30-40x?',a:'Четыре фактора дисконта: 1) Страновой риск Венесуэлы — значительная risk premium за политическую нестабильность. 2) Ликвидность: частная компания без публичного листинга — illiquidity discount 20-30%. 3) Размер и масштаб: Nubank — $50B+ рынок с 90M+ клиентами; Cashea — один рынок 32M. 4) Ограниченность данных для верификации метрик. Именно этот дисконт и создаёт инвестиционную возможность: если эти риски преодолены к IPO, переоценка с 9x до 30x = 3x только на мультипликаторе.'},
  {cat:'18',q:'Как Axevil считает «implied discount to last round» при форвардных контрактах?',a:'Форвардный контракт: фиксируется цена покупки сейчас, акции передаются в будущем (например, после IPO). Implied discount: если последний раунд был при $14B, форвардный контракт заключается по $12B (примерный пример) — discount 14.3% к последнему раунду. При Skild AI: «оценка входа $17.95B» выше Series C $14B — это secondary premium, а не discount (рынок оценивает актив выше последнего раунда, отражая рост между C и IPO). Важно понимать: $17.95B — это implied valuation при покупке доли на вторичном рынке.'},
  {cat:'18',q:'Как вы моделируете down round для Skild AI — насколько оценка защищена выручкой?',a:'Текущая Revenue multiple: оценка входа $17.95B при выручке $30M = 598x EV/Revenue (очень высокая). При $150M выручки в 2026: $17.95B/150M = 120x — всё ещё высоко. Защита появляется только при $300-500M+ выручки: тогда 25-35x EV/Revenue даёт оценку $7.5-17.5B+. Риск down round максимален в 2026-2027, когда выручка ещё не достигла уровня, оправдывающего оценку. К 2028-2029 ($1.3-3B ARR) риск нивелируется — именно поэтому Axevil входит в расчёте на горизонт 3 года.'},
  {cat:'18',q:'Что такое «secondary premium» vs «secondary discount» и почему вход в Skild выше раунда?',a:'Secondary discount: продавец соглашается продать ниже последнего раунда ради ликвидности. Характерно для компаний с неопределённым будущим или продавцов с cash-flow нуждами. Secondary premium: рынок готов платить выше последнего раунда из-за ожиданий роста до IPO. Skild AI: Series C закрыт в январе 2026 при $14B, Axevil входит при $17.95B (+28% к раунду) — рынок верит, что между C и IPO компания ещё значительно вырастет. Это корректная логика, если рост выручки подтверждает premium.'},
  {cat:'18',q:'Как считается blended IRR по портфелю с реализованными и нереализованными позициями?',a:'Blended IRR = взвешенный IRR с учётом размера позиций. Реализованные: Confluent 256%, Anthropic 240%, Circle 200%, Scale AI (дивиденд + рост). Нереализованные: оцениваются по последнему раунду или текущей рыночной оценке. Стандарт GIPS (Global Investment Performance Standards) требует разделения: realized IRR + unrealized MOIC. Заявленные Axevil цифры — исключительно реализованные выходы. Blended IRR включая unreализованные позиции (30+ компаний) будет ниже и зависит от итоговых выходов.'},
  {cat:'18',q:'Что такое «liquidity haircut» при оценке вторичного рынка?',a:'Liquidity haircut — дисконт к теоретической «справедливой» стоимости из-за отсутствия ликвидности. В private markets стандартный haircut: 20-35% к последнему раунду для неторгуемых акций. Применение: если акция Skild AI «стоит» $17.95B согласно сделке, реальная liquidation value меньше — продать на вторичном рынке мгновенно по этой цене невозможно. Axevil решает эту проблему через SPV-структуру (инвестор не продаёт акции, SPV управляет позицией до выхода) и планируемый secondary marketplace.'},
  {cat:'18',q:'Как Axevil объясняет «240% IRR» Anthropic при частичном выходе на вторичном рынке?',a:'Вход апрель 2024 при оценке $14.55B. Anthropic выросла до $61.5B к январю 2026 (+323%). Частичный выход на вторичном рынке в январе 2026 — SPV продала часть позиции покупателям. IRR 240% = (exit value / entry value)^(1/years) - 1. При 3x MOIC за 21 месяц: IRR ≈ 180%. При более высоком MOIC — выше. 240% возможно при: MOIC ~4x+ за ~18 месяцев или MOIC ~3x за ~12 месяцев. Важно: это заявленный IRR на частичный выход, а не на полную позицию. Оставшиеся акции ещё в портфеле.'},
  {cat:'18',q:'Как рассчитать реалистичный сценарий для Prometheus при захвате 1% рынка $14 трлн?',a:'TAM $14 трлн — промышленное проектирование и производство глобально. 1% = $140 млрд выручки. Но: 1) SaaS penetration — Prometheus не заменяет 100% рынка, а берёт долю software-инструментов (~$50B из $14 трлн). 2) Реалистичный addressable: замена ANSYS/Synopsys/Dassault = ~$50B. 5% = $2.5B выручки. При 50x EV/Revenue = $125B оценка. Фаза монетизации 2028+: $2-3B выручки. Оценка IPO при $2.5B × 40x = $100B. Апсайд от входа $48B: 2.1x. Консервативно. Базовый тезис Axevil ($500B) предполагает захват значительно большего рынка.'},
  {cat:'18',q:'Как Axevil оценивает риск «winner takes all» в VLA-моделях?',a:'В AI winner-takes-all — распространённая, но не универсальная динамика. Для VLA: 1) Hardware-diversity (сотни типов роботов) создаёт нишевые рынки, где один лидер не всегда доминирует полностью. 2) Enterprise contracts долгосрочные — switching cost высок. 3) Прецедент: в LLM не один победитель (OpenAI + Anthropic + Gemini сосуществуют). В VLA вероятно 2-3 лидера. 4) Риск: Google DeepMind с RT-2, Tesla с Optimus Brain — оба работают над universal models. Если один из них достигнет scale Skild раньше — компрессия доли рынка.'},
  {cat:'18',q:'Что такое J-curve в контексте SPV и как объяснить инвестору первые 12-18 месяцев?',a:'J-curve эффект в SPV: 1) Сразу при входе: стоимость позиции = вложенная сумма минус front-end fee (5%). Инвестор «в минусе» с первого дня. 2) Первые 6-18 месяцев: оценка не меняется (нет нового раунда), инвестор видит стабильную NAV. 3) При новом раунде (up) — NAV растёт. 4) При выходе — реализация прибыли. Объяснение: «Вы купили долю в быстрорастущей компании. Сегодня она стоит столько, сколько вы заплатили. Через 3 года — кратно больше. Ликвидности нет — это намеренно, это и есть источник доходности: вы получаете illiquidity premium».'},
  {cat:'18',q:'Как верифицировать прогноз выручки Prometheus $2-3B к 2028 без прецедентов в категории?',a:'Методология при отсутствии прецедентов: 1) Bottom-up от клиентов: GlobalFoundries экономит $10M+/год. 100 таких клиентов × $1M ARR = $100M. Для $2-3B нужно 2000-3000 enterprise клиентов. 2) Addressable spend: крупные промышленные компании тратят $50-200M/год на инженерный софт. 3% penetration от $50B рынка = $1.5B. 3) Сравнимый кейс: Palantir — $0 выручки в 2003, $1.9B в 2023 через enterprise government. Prometheus имеет более мощный founder и более широкий TAM. Прогноз амбициозен, но не фантастичен.'},
  {cat:'18',q:'Как «implied IRR» сделки соотносится с заявленными историческими показателями Axevil?',a:'Исторические реализованные: 256% (Confluent, 8 месяцев), 240% (Anthropic, 21 месяц), 200% (Circle, 18 месяцев). Текущие целевые: Skild AI 4.5x за 3 года = ~65% IRR. Cashea 7.8x за ~4 года = ~67% IRR. Prometheus 10.4x за 3 года = ~120% IRR. Вывод: исторические IRR аномально высокие из-за коротких сроков (Confluent — 8 месяцев). Текущие сделки с горизонтом 3-4 года — нормализованный IRR 65-120%. Это по-прежнему кратно выше Public Markets (17% Nasdaq 2012-2024).'}
];

const CAT_NAMES = {
  '1':'Об Axevil','2':'Инвест. процесс','3':'Выход','4':'Портфель',
  '5':'Юр. аспекты','6':'Продукт','7':'Партнёрства','8':'Рынок',
  '9':'Риски','10':'Практика','11':'Возражения','12':'Фин. детали',
  '13':'Cashea','14':'Skild AI','15':'Prometheus',
  '16':'Комм. директор','17':'Head of Invest.','18':'Invest. Analysis'
};

let activeCat = 'all';
let filtered = [...ALL_CARDS];
let idx = 0;
let isFlipped = false;

function getFiltered() {
  return activeCat === 'all' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === activeCat);
}

function render() {
  const c = document.getElementById('card');
  c.classList.remove('flipped');
  isFlipped = false;
  setTimeout(() => {
    const card = filtered[idx];
    const cat = card.cat;
    const badge = document.getElementById('q-badge');
    badge.textContent = CAT_NAMES[cat];
    badge.style.background = CAT_BG[cat];
    badge.style.color = CAT_COLORS[cat];
    document.getElementById('q-num').textContent = 'Вопрос ' + (idx + 1) + ' из ' + filtered.length;
    document.getElementById('q-text').textContent = card.q;
    document.getElementById('a-text').textContent = card.a;
    document.getElementById('counter').textContent = (idx + 1) + ' / ' + filtered.length;
    const pct = ((idx + 1) / filtered.length * 100).toFixed(1);
    document.getElementById('progbar').style.width = pct + '%';
  }, 50);
}

const CAT_BG = {
  '1':'#E6F1FB','2':'#E1F5EE','3':'#EAF3DE','4':'#FAECE7','5':'#EEEDFE',
  '6':'#FBEAF0','7':'#FAEEDA','8':'#E6F1FB','9':'#FCEBEB','10':'#E1F5EE',
  '11':'#EEEDFE','12':'#EAF3DE','13':'#FAECE7','14':'#E1F5EE','15':'#EEEDFE'
};
const CAT_COLORS = {
  '1':'#185FA5','2':'#0F6E56','3':'#3B6D11','4':'#993C1D','5':'#534AB7',
  '6':'#993556','7':'#884800','8':'#185FA5','9':'#A32D2D','10':'#0F6E56',
  '11':'#534AB7','12':'#3B6D11','13':'#993C1D','14':'#0F6E56','15':'#534AB7'
};

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}
function next() { idx = (idx + 1) % filtered.length; render(); }
function prev() { idx = (idx - 1 + filtered.length) % filtered.length; render(); }

function buildFilters() {
  const cont = document.getElementById('filters');
  cont.innerHTML = '';
  CATS.forEach(c => {
    const count = c.id === 'all' ? ALL_CARDS.length : ALL_CARDS.filter(x => x.cat === c.id).length;
    const btn = document.createElement('button');
    btn.className = 'filter' + (c.id === activeCat ? ' active' : '');
    btn.textContent = c.label + ' (' + count + ')';
    btn.onclick = () => {
      activeCat = c.id;
      filtered = getFiltered();
      idx = 0;
      buildFilters();
      render();
    };
    cont.appendChild(btn);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

buildFilters();
render();
</script>
